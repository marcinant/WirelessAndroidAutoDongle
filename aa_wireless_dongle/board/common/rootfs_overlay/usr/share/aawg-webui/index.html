<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AA Wireless Dongle</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body { margin: 0; font-family: system-ui, sans-serif; background: #14171a; color: #dde3e8; }
header { padding: 14px 20px; background: #1d2126; border-bottom: 1px solid #2c323a; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
header h1 { margin: 0; font-size: 18px; }
header .up { color: #7f8b96; font-size: 13px; }
main { padding: 16px 20px; max-width: 980px; margin: 0 auto; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
.card { background: #1d2126; border: 1px solid #2c323a; border-radius: 8px; padding: 10px 12px; }
.card .k { font-size: 12px; color: #7f8b96; text-transform: uppercase; letter-spacing: .04em; }
.card .v { font-size: 15px; margin-top: 4px; word-break: break-all; }
.ok { color: #6fd38b; } .warn { color: #e8c268; } .bad { color: #e87a68; }
#stage { margin-top: 12px; padding: 10px 12px; background: #1d2126; border: 1px solid #2c323a; border-radius: 8px; font-size: 13px; color: #aeb8c2; word-break: break-all; }
#hint { margin-top: 8px; padding: 10px 12px; border-radius: 8px; font-size: 14px; display: none; }
#hint.show { display: block; background: #2a2617; border: 1px solid #57491f; color: #e8c268; }
h2 { font-size: 15px; margin: 22px 0 8px; color: #aeb8c2; }
.charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
.chart { background: #1d2126; border: 1px solid #2c323a; border-radius: 8px; padding: 10px 12px; }
.chart .k { font-size: 12px; color: #7f8b96; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.chart canvas { display: block; width: 100%; height: 90px; }
#events { background: #0d0f11; border: 1px solid #2c323a; border-radius: 8px; padding: 10px; max-height: 220px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 12px; }
#events .ev { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
#events .t { color: #7f8b96; }
#events .src-h { color: #6aa9e8; }
#events .src-a { color: #6fd38b; }
#log { background: #0d0f11; border: 1px solid #2c323a; border-radius: 8px; padding: 10px; height: 320px; overflow-y: scroll; font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
button, textarea, input { font: inherit; }
.form { background: #1d2126; border: 1px solid #2c323a; border-radius: 8px; padding: 12px; }
.form .fr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.form label { flex: 0 0 60px; }
.form input { flex: 1; min-width: 200px; background: #0d0f11; color: #dde3e8; border: 1px solid #2c323a; border-radius: 6px; padding: 6px 8px; }
button { background: #2c5aa0; color: #fff; border: 0; border-radius: 6px; padding: 7px 14px; cursor: pointer; margin-right: 8px; }
button.sec { background: #2c323a; }
button.danger { background: #8a3b2e; }
button:disabled { opacity: .5; cursor: default; }
#conf { width: 100%; height: 260px; background: #0d0f11; color: #dde3e8; border: 1px solid #2c323a; border-radius: 8px; padding: 10px; font-family: ui-monospace, monospace; font-size: 13px; }
.row { margin-top: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
#msg { font-size: 13px; color: #7f8b96; }
label { font-size: 13px; color: #7f8b96; }
</style>
</head>
<body>
<header>
	<h1>AA Wireless Dongle</h1>
	<span class="up" id="uptime">–</span>
</header>
<main>
	<div class="cards">
		<div class="card"><div class="k">Daemon</div><div class="v" id="daemon">–</div></div>
		<div class="card"><div class="k">Bluetooth</div><div class="v" id="bt">–</div></div>
		<div class="card"><div class="k">Wifi client</div><div class="v" id="wifi">–</div></div>
		<div class="card"><div class="k">AA session (TCP)</div><div class="v" id="tcp">–</div></div>
		<div class="card"><div class="k">USB gadget</div><div class="v" id="usb">–</div></div>
		<div class="card"><div class="k">Link RTT</div><div class="v" id="rtt">–</div></div>
		<div class="card"><div class="k">Wifi drops</div><div class="v" id="drops">–</div></div>
	</div>
	<div id="stage">–</div>
	<div id="hint"></div>

	<h2>Stream</h2>
	<div class="charts">
		<div class="chart"><div class="k">Throughput (Mbps, phone→car / car→phone)</div><canvas id="c_bps"></canvas></div>
		<div class="chart"><div class="k">Latency to phone (ms)</div><canvas id="c_rtt"></canvas></div>
		<div class="chart"><div class="k">Wifi signal (dBm)</div><canvas id="c_sig"></canvas></div>
	</div>

	<h2>Connection events</h2>
	<div id="events">no events yet</div>

	<h2>Home Assistant</h2>
	<div class="form">
		<div class="fr"><label for="ha_url">URL</label><input id="ha_url" type="text" placeholder="https://example.ui.nabu.casa"></div>
		<div class="fr"><label for="ha_token">Token</label><input id="ha_token" type="password" placeholder="long-lived access token (HA: profile → security)"></div>
		<div class="fr"><label for="ha_entity">Entity</label><input id="ha_entity" type="text" placeholder="binary_sensor.car_running"></div>
		<div class="row">
			<button id="ha_save">Save</button>
			<button class="sec" id="ha_test">Test connection</button>
			<span id="ha_msg"></span>
		</div>
	</div>

	<h2>Log</h2>
	<div id="log"></div>
	<div class="row">
		<button class="sec" id="pause">Pause</button>
		<label><input type="checkbox" id="follow" checked> follow</label>
	</div>

	<h2>Configuration (/boot/aawgd.conf)</h2>
	<textarea id="conf" spellcheck="false"></textarea>
	<div class="row">
		<button id="save">Save</button>
		<button class="sec" id="reload">Reload</button>
		<button class="danger" id="reboot">Reboot dongle</button>
		<span id="msg"></span>
	</div>
</main>
<script>
"use strict";
var paused = false;

function fmtUptime(s) {
	var d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600), m = Math.floor(s % 3600 / 60);
	return (d ? d + "d " : "") + h + "h " + m + "m";
}

function setV(id, text, cls) {
	var el = document.getElementById(id);
	el.textContent = text;
	el.className = "v" + (cls ? " " + cls : "");
}

function hint(text) {
	var el = document.getElementById("hint");
	if (text) { el.textContent = "Hint: " + text; el.className = "show"; }
	else { el.className = ""; }
}

function deriveHint(s) {
	var st = s.stage || "";
	if (!s.aawgd_running) return "aawgd is not running - reboot the dongle or check the log for a crash.";
	if (s.tcp_state === "ESTABLISHED" && s.usb_gadget === "none")
		return "Phone connected over wifi but no USB gadget is active - check the USB cable and use the data port of the car.";
	if (s.tcp_state === "ESTABLISHED" && s.usb_gadget === "default" && st.indexOf("Forwarding data") < 0)
		return "Waiting for the head unit accessory-start - if this persists, try unplugging and replugging the USB cable.";
	if (s.bt_powered && s.tcp_state === "none" && !s.wifi_stations && st.indexOf("powered on") >= 0)
		return "Waiting for the phone - make sure bluetooth is on and the dongle is paired (see the phone's bluetooth settings).";
	if (st.indexOf("handshake read failed") >= 0)
		return "Wifi handshake failed - on the phone, forget the dongle wifi network and reconnect, or re-pair bluetooth.";
	if (st.indexOf("Failed to connect") >= 0 && s.tcp_state === "none")
		return "Cannot reach the phone over bluetooth - bring the phone close, or open Android Auto manually to trigger the connection.";
	return "";
}

function tick() {
	fetch("/cgi-bin/status.cgi").then(function (r) { return r.json(); }).then(function (s) {
		document.getElementById("uptime").textContent = "uptime " + fmtUptime(s.uptime_s);
		setV("daemon", s.aawgd_running ? "running" : "stopped", s.aawgd_running ? "ok" : "bad");
		var bt = s.bt_powered ? "powered" : "off";
		if (s.bt_devices) bt += " · " + s.bt_devices.replace(/;$/, "").replace(/;/g, ", ");
		setV("bt", bt, s.bt_powered ? "ok" : "");
		setV("wifi", s.wifi_stations ? s.wifi_stations.replace(/;$/, "").replace(/;/g, ", ") : "none", s.wifi_stations ? "ok" : "");
		setV("tcp", s.tcp_state, s.tcp_state === "ESTABLISHED" ? "ok" : (s.tcp_state === "none" ? "" : "warn"));
		setV("usb", s.usb_gadget, s.usb_gadget === "accessory" ? "ok" : (s.usb_gadget === "none" ? "" : "warn"));
		document.getElementById("stage").textContent = s.stage || "no aawgd activity in the log yet";
		hint(deriveHint(s));
	}).catch(function () {});
}

function tickLog() {
	if (paused) return;
	fetch("/cgi-bin/logs.cgi?n=300").then(function (r) { return r.text(); }).then(function (t) {
		var el = document.getElementById("log");
		el.textContent = t;
		if (document.getElementById("follow").checked) el.scrollTop = el.scrollHeight;
	}).catch(function () {});
}

function loadConf() {
	fetch("/cgi-bin/config.cgi").then(function (r) { return r.text(); }).then(function (t) {
		document.getElementById("conf").value = t;
	});
}

document.getElementById("pause").onclick = function () {
	paused = !paused;
	this.textContent = paused ? "Resume" : "Pause";
};
document.getElementById("reload").onclick = loadConf;
document.getElementById("save").onclick = function () {
	var btn = this, msg = document.getElementById("msg");
	btn.disabled = true; msg.textContent = "saving...";
	fetch("/cgi-bin/config.cgi", { method: "POST", headers: { "Content-Type": "text/plain" }, body: document.getElementById("conf").value })
		.then(function (r) { return r.json(); })
		.then(function (j) { msg.textContent = j.ok ? j.note : ("error: " + j.error); })
		.catch(function (e) { msg.textContent = "error: " + e; })
		.then(function () { btn.disabled = false; });
};
document.getElementById("reboot").onclick = function () {
	if (!confirm("Reboot the dongle now?")) return;
	fetch("/cgi-bin/reboot.cgi", { method: "POST" });
	document.getElementById("msg").textContent = "rebooting...";
};

// --- Stream charts (data from aawg-statsd via stats.cgi) ---
// CSV columns: uptime_s,rx_bytes,tx_bytes,signal_dbm,tx_retries,tx_failed,rtt_ms,aa_session

function drawChart(id, series, colors) {
	var c = document.getElementById(id), ctx = c.getContext("2d");
	var w = c.clientWidth, h = 90;
	c.width = w; c.height = h;
	ctx.clearRect(0, 0, w, h);

	var min = Infinity, max = -Infinity, i, j, v;
	for (i = 0; i < series.length; i++)
		for (j = 0; j < series[i].length; j++) {
			v = series[i][j];
			if (v === null) continue;
			if (v < min) min = v;
			if (v > max) max = v;
		}
	if (min === Infinity) { ctx.fillStyle = "#7f8b96"; ctx.font = "12px sans-serif"; ctx.fillText("no data", 8, h / 2); return; }
	if (max - min < 1e-9) { max += 1; min -= 1; }
	var pad = (max - min) * 0.1;
	max += pad; min -= pad;

	ctx.strokeStyle = "#2c323a";
	ctx.beginPath();
	for (i = 1; i < 3; i++) { ctx.moveTo(0, h * i / 3); ctx.lineTo(w, h * i / 3); }
	ctx.stroke();

	var n = series[0].length;
	for (i = 0; i < series.length; i++) {
		ctx.strokeStyle = colors[i];
		ctx.lineWidth = 1.5;
		ctx.beginPath();
		var started = false;
		for (j = 0; j < n; j++) {
			v = series[i][j];
			if (v === null) { started = false; continue; }
			var x = n > 1 ? j * w / (n - 1) : 0;
			var y = h - (v - min) / (max - min) * h;
			if (started) ctx.lineTo(x, y); else { ctx.moveTo(x, y); started = true; }
		}
		ctx.stroke();
	}

	ctx.fillStyle = "#7f8b96"; ctx.font = "11px sans-serif";
	ctx.fillText(max.toFixed(max < 10 ? 1 : 0), 4, 12);
	ctx.fillText(min.toFixed(min < 10 && min > -10 ? 1 : 0), 4, h - 4);
}

function tickStats() {
	fetch("/cgi-bin/stats.cgi").then(function (r) { return r.text(); }).then(function (t) {
		var rows = t.split("\n").filter(function (l) { return l.length; }).map(function (l) { return l.split(","); });
		if (!rows.length) return;

		var down = [], up = [], rtts = [], sigs = [], i;
		for (i = 1; i < rows.length; i++) {
			var dt = rows[i][0] - rows[i - 1][0];
			var drx = rows[i][1] - rows[i - 1][1], dtx = rows[i][2] - rows[i - 1][2];
			// rx on the AP = data coming from the phone (the AA stream to the car)
			down.push(dt > 0 && dt < 30 && drx >= 0 ? drx * 8 / dt / 1e6 : null);
			up.push(dt > 0 && dt < 30 && dtx >= 0 ? dtx * 8 / dt / 1e6 : null);
			rtts.push(rows[i][6] === "" ? null : parseFloat(rows[i][6]));
			sigs.push(rows[i][3] === "" ? null : parseFloat(rows[i][3]));
		}
		drawChart("c_bps", [down, up], ["#6aa9e8", "#6fd38b"]);
		drawChart("c_rtt", [rtts], ["#e8c268"]);
		drawChart("c_sig", [sigs], ["#b58ae8"]);

		var last = rows[rows.length - 1];
		var rtt = last[6] !== "" ? parseFloat(last[6]) : null;
		var sig = last[3] !== "" ? last[3] + " dBm" : "";
		setV("rtt", rtt !== null ? rtt.toFixed(0) + " ms" + (sig ? " · " + sig : "") : (sig || "no client"),
			rtt === null ? "" : (rtt > 100 ? "warn" : "ok"));

		var fails = last[5] !== "" ? last[5] : "0";
		setV("drops", fails + " tx failed · " + wifiDrops + " disconnects",
			(parseInt(fails, 10) > 50 || wifiDrops > 2) ? "warn" : "");
	}).catch(function () {});
}

// --- Connection events (hostapd + aawgd) ---
var wifiDrops = 0;

function tickEvents() {
	fetch("/cgi-bin/events.cgi").then(function (r) { return r.text(); }).then(function (t) {
		var lines = t.split("\n").filter(function (l) { return l.length; });
		wifiDrops = lines.filter(function (l) { return l.indexOf("AP-STA-DISCONNECTED") >= 0; }).length;
		if (!lines.length) return;
		var el = document.getElementById("events");
		el.innerHTML = "";
		lines.forEach(function (l) {
			var div = document.createElement("div");
			div.className = "ev";
			var m = l.match(/^hostapd (\d+)\.\d+: (.*)$/);
			var tspan = document.createElement("span"), src = document.createElement("span"), rest;
			tspan.className = "t";
			if (m) {
				tspan.textContent = new Date(m[1] * 1000).toLocaleTimeString() + " ";
				src.className = "src-h"; src.textContent = "wifi ";
				rest = m[2];
			} else {
				tspan.textContent = "";
				src.className = "src-a"; src.textContent = "aa ";
				rest = l.replace(/^aawgd /, "");
			}
			div.appendChild(tspan); div.appendChild(src);
			div.appendChild(document.createTextNode(rest));
			el.appendChild(div);
		});
	}).catch(function () {});
}

// --- Home Assistant settings (ha.cgi) ---

function haMsg(text) { document.getElementById("ha_msg").textContent = text; }

function haField(id) { return document.getElementById(id).value.trim(); }

function loadHA() {
	fetch("/cgi-bin/ha.cgi").then(function (r) { return r.json(); }).then(function (j) {
		document.getElementById("ha_url").value = j.url || "";
		document.getElementById("ha_token").value = j.token || "";
		document.getElementById("ha_entity").value = j.entity || "";
	}).catch(function () {});
}

function haPost(action) {
	var body = "action=" + action + "\nurl=" + haField("ha_url") +
		"\ntoken=" + haField("ha_token") + "\nentity=" + haField("ha_entity");
	return fetch("/cgi-bin/ha.cgi", { method: "POST", headers: { "Content-Type": "text/plain" }, body: body })
		.then(function (r) { return r.json(); });
}

document.getElementById("ha_save").onclick = function () {
	var btn = this;
	btn.disabled = true; haMsg("saving...");
	haPost("save")
		.then(function (j) { haMsg(j.ok ? j.note : ("error: " + j.error)); })
		.catch(function (e) { haMsg("error: " + e); })
		.then(function () { btn.disabled = false; });
};

document.getElementById("ha_test").onclick = function () {
	var btn = this, url = haField("ha_url"), token = haField("ha_token");
	if (!url || !token) { haMsg("enter URL and token first"); return; }
	btn.disabled = true; haMsg("testing from this phone...");
	// First try directly from the browser - the phone has internet over LTE
	// even while on the dongle wifi. HA blocks cross-origin requests unless
	// cors_allowed_origins is configured, so fall back to testing from the
	// dongle itself (works when the PAN uplink is up).
	fetch(url.replace(/\/$/, "") + "/api/", { headers: { "Authorization": "Bearer " + token } })
		.then(function (r) {
			if (r.status === 200) haMsg("OK: connected, token accepted (checked from phone)");
			else if (r.status === 401 || r.status === 403) haMsg("error: token rejected (HTTP " + r.status + ")");
			else haMsg("error: HA answered HTTP " + r.status);
		})
		.catch(function () {
			haMsg("phone-side check blocked (CORS), testing from dongle...");
			return haPost("test").then(function (j) {
				haMsg(j.ok ? "OK: " + j.note : ("error: " + j.error + (j.hint ? " — " + j.hint : "")));
			}).catch(function (e) { haMsg("error: " + e); });
		})
		.then(function () { btn.disabled = false; });
};

tick(); tickLog(); loadConf(); tickEvents(); tickStats(); loadHA();
setInterval(tick, 2000);
setInterval(tickLog, 3000);
setInterval(tickStats, 3000);
setInterval(tickEvents, 10000);
</script>
</body>
</html>
