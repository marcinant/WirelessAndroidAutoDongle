#!/bin/sh

######## Configuration options for Android Auto Wireless Dongle ########

## Country code (ISO/IEC 3166-1)
## Set the regulatory domain for the wifi network. This will help configure the wifi correctly for the country you're in.
AAWG_COUNTRY_CODE=IN


## Set the connection strategy to use
## 0 - Dongle mode. Waits for both dongle and headunit bluetooth connections and then starts the wifi and usb connections.
## 1 - Phone first (default). Waits for the phone bluetooth and wifi to connect first, and then starts the usb connection.
## 2 - Usb first. Waits for the usb to connect first, and then starts the bluetooth and wifi connection with phone.
AAWG_CONNECTION_STRATEGY=1


## Override bluetooth name suffix
## Set a custom suffix to replace unique id used in "WirelessAADongle-<suffix>" or "AndroidAuto-Dongle-<suffix>"
#AAWG_UNIQUE_NAME_SUFFIX=


## Disable the fake HSP Handset profile
## By default the dongle exposes a fake headset (HSP) profile to the phone. This
## occupies the phone's hands-free/call profile, which can stop the car's own
## bluetooth (e.g. Audi MMI) from handling phone calls. Set to 1 to disable it so
## the car keeps HFP for calls. Only works with connection strategy 1 or 2.
## Note: most phones need the fake headset to start wireless Android Auto - if AA
## stops connecting after enabling this, revert to 0 and rely on
## AAWG_EARLY_HSP_RELEASE below instead.
#AAWG_DISABLE_HSP=1

## Early HSP release (default enabled)
## With the fake headset enabled, disconnect it as soon as the phone opens the
## Android Auto channel - it is only needed as the wake-up trigger. This frees
## the phone's hands-free/call profile for the car's own bluetooth a few seconds
## earlier. Set to 0 to keep the handset connected until bluetooth powers off
## (original behaviour).
#AAWG_EARLY_HSP_RELEASE=1



## Web UI (diagnostics + configuration panel)
## A small web panel served at http://10.0.0.1/ on the dongle's wifi network:
## live connection status, log viewer and this config file editable from the
## browser. Enabled by default; set to 0 to disable.
#AAWG_ENABLE_WEBUI=1

## Protect the web UI with a password (recommended)
## When set, the browser will ask for user "admin" and this password. Anyone
## connected to the dongle wifi (including the phone) can reach the panel
## otherwise.
#AAWG_WEBUI_PASSWORD=


######## Advanced Configuration ########

## Override Wifi Password
## Set a custom password for the wifi network.
## This is usually only required when you're debugging the dongle. Not recommended for normal use.
#AAWG_WIFI_PASSWORD=ConnectAAWirelessDongle


## Enable SSH
## Enable SSH server to login and access the dongle's command prompt.
## This is usually only required when you're debugging the dongle. Not recommended for normal use.
#AAWG_ENABLE_SSH=1
