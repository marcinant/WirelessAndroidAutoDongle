#!/bin/sh

######## Configuration options for Android Auto Wireless Dongle ########

## Country code (ISO/IEC 3166-1)
## Set the regulatory domain for the wifi network. This will help configure the wifi correctly for the country you're in.
AAWG_COUNTRY_CODE=IN


## Set the connection strategy to use
## 0 - Dongle mode. Waits for both dongle and headunit bluetooth connections and then starts the wifi and usb connections.
## 1 - Phone first (default). Waits for the phone bluetooth and wifi to connect first, and then starts the usb connection.
## 2 - Usb first. Waits for the usb to connect first, and then starts the bluetooth and wifi connection with phone.
AAWG_CONNECTION_STRATEGY=1


## Override bluetooth name suffix
## Set a custom suffix to replace the default in "AudiAndroidAuto-<suffix>" or
## "AndroidAuto-Dongle-<suffix>". Default suffix is the 6-char git hash of the
## image build (device serial number when built outside a git tree).
#AAWG_UNIQUE_NAME_SUFFIX=


## Disable the fake HSP Handset profile
## By default the dongle exposes a fake headset (HSP) profile to the phone. This
## occupies the phone's hands-free/call profile, which can stop the car's own
## bluetooth (e.g. Audi MMI) from handling phone calls. Set to 1 to disable it so
## the car keeps HFP for calls. Only works with connection strategy 1 or 2.
## Note: most phones need the fake headset to start wireless Android Auto - if AA
## stops connecting after enabling this, revert to 0 and rely on
## AAWG_EARLY_HSP_RELEASE below instead.
#AAWG_DISABLE_HSP=1

## Early HSP release (default enabled)
## With the fake headset enabled, disconnect it as soon as the phone opens the
## Android Auto channel - it is only needed as the wake-up trigger. This frees
## the phone's hands-free/call profile for the car's own bluetooth a few seconds
## earlier. Set to 0 to keep the handset connected until bluetooth powers off
## (original behaviour).
#AAWG_EARLY_HSP_RELEASE=1



## Web UI (diagnostics + configuration panel)
## A small web panel served at http://10.0.0.1/ on the dongle's wifi network:
## live connection status, log viewer and this config file editable from the
## browser. Enabled by default; set to 0 to disable.
#AAWG_ENABLE_WEBUI=1

## Protect the web UI with a password (recommended)
## When set, the browser will ask for user "admin" and this password. Anyone
## connected to the dongle wifi (including the phone) can reach the panel
## otherwise.
#AAWG_WEBUI_PASSWORD=

## Stream metrics collector
## Samples wifi throughput, latency to the phone, signal and drop counters
## every few seconds. Feeds the charts in the web UI and keeps a per-minute
## history on the persist partition (uploaded by home sync, see below).
## Enabled by default; set to 0 to disable.
#AAWG_ENABLE_STATS=1


######## Cloud sync over the phone's internet (optional) ########

## The dongle has no internet of its own in the car (the wifi radio is busy
## being the Android Auto access point). Cloud sync borrows the PHONE's
## mobile data over Bluetooth PAN tethering instead: once the AA session is
## up, the dongle connects to the paired phone over bluetooth, gets an IP on
## bnep0 and periodically pushes telemetry to your public endpoints, plus a
## one-time NTP clock sync per boot (the Pi has no RTC).
##
## Phone-side requirement: enable "Bluetooth tethering" on the phone
## (Samsung: Settings -> Connections -> Mobile Hotspot and Tethering).
## Data usage is negligible (~1 KB per push).
##
## Enabled automatically when any endpoint below is set. HTTPS URLs are
## supported (curl + ca-certificates are on the image).

## Master switch: set to 0 to disable without clearing the endpoints.
#AAWG_CLOUD_SYNC=1

## Seconds between pushes while the car is running.
#AAWG_CLOUD_INTERVAL=300

## Bluetooth MAC of the phone providing tethering. Defaults to the first
## paired device, which is right for a single-phone setup.
#AAWG_PAN_PHONE_MAC=

## NTP server used for the clock sync.
#AAWG_NTP_SERVER=pool.ntp.org

## Home Assistant, via the REST API (create a long-lived access token in
## HA: profile -> security). Sets the entity to "on" with attributes
## (uptime, AA session state, wifi signal) on every push - i.e. "the car is
## running now". Turning it "off" is an HA automation's job (e.g. state
## not updated for 2*AAWG_CLOUD_INTERVAL), because the dongle loses power
## when the car stops. Use your public HA URL (e.g. Nabu Casa).
#AAWG_HA_URL=https://example.ui.nabu.casa
#AAWG_HA_TOKEN=
#AAWG_HA_ENTITY=binary_sensor.car_running

## Generic JSON webhook, pushed on the same schedule. Works great with an
## HA webhook trigger (https://<ha>/api/webhook/<id>) - no token involved.
#AAWG_CLOUD_URL=

## Upload the per-minute stats history (see AAWG_ENABLE_STATS) as an HTTP
## POST (text/plain body) to this URL. Uploaded data is moved to
## history.log.sent so it is never sent twice. Line format:
##   epoch_s uptime_s rx_bytes tx_bytes signal_dbm tx_failed aa_session
#AAWG_LOG_UPLOAD_URL=

## Note on Traccar / GPS tracking: the dongle has no GPS and cannot read
## position from the Android Auto stream (it is end-to-end encrypted between
## the phone and the head unit). For location tracking, run the Traccar
## Client app on the phone; use this cloud sync for engine-on/health data.


######## Car WiFi uplink (STA, optional) ########

## The dongle's wlan0 radio normally only runs as an access point (AP) for
## the phone, so the phone has no internet unless it has its own cellular
## data. If the car itself broadcasts a WiFi hotspot with internet, the
## dongle can join it as a client on a second virtual interface
## (wlan0_sta) and NAT it to the phone - the phone stays connected only to
## the dongle's own AP, nothing changes on the phone side.
##
## Concurrent AP+STA depends on the WiFi chip/firmware; if unsupported the
## feature cleanly disables itself and the AP keeps working as before.
##
## OFF BY DEFAULT. Configure via the web UI / companion app (recommended -
## the password is validated and never has to be typed into this file), or
## set the values below directly.

## Master switch. Set to 1 to enable (requires AAWG_STA_SSID to be set).
#AAWG_STA_ENABLE=0

## SSID of the car's wifi hotspot.
#AAWG_STA_SSID=

## Password of the car's wifi hotspot. Leave unset/empty for an open network.
#AAWG_STA_PASSWORD=


######## OBD-II logger (optional, experimental) ########

## Log car data from a Bluetooth ELM327 adapter plugged into the OBD-II port.
## The dongle connects to the adapter over its own Bluetooth and writes
## readings to /persist/aawg/obd.log; the latest snapshot is pushed to Home
## Assistant by the cloud sync above.
##
## WARNING: this uses the dongle's single Bluetooth radio, shared with the
## Android Auto link. It can affect AA stability. Off by default; enable only
## after pairing the adapter to the dongle and be ready to disable it if AA
## misbehaves. Poll rate is deliberately low.
##
## Pair the adapter first (once), e.g. over SSH:
##   bluetoothctl  ->  scan on  ->  pair <MAC>  ->  trust <MAC>
## ELM327 clones usually take PIN 1234 or 0000.

## Master switch. Set to 1 (and set the MAC) to enable.
#AAWG_OBD_ENABLE=0

## Bluetooth MAC of the ELM327 adapter.
#AAWG_OBD_MAC=

## RFCOMM channel (ELM327 SPP is almost always 1).
#AAWG_OBD_CHANNEL=1

## Seconds between poll rounds (minimum 2; higher is gentler on the AA link).
#AAWG_OBD_INTERVAL=5

## Push the latest OBD snapshot to Home Assistant as sensors, using the same
## AAWG_HA_URL/AAWG_HA_TOKEN as above. Entity ids are <prefix>_<metric>.
#AAWG_OBD_HA_PREFIX=sensor.car


######## Advanced Configuration ########

## Override Wifi Password
## Set a custom password for the wifi network.
## This is usually only required when you're debugging the dongle. Not recommended for normal use.
#AAWG_WIFI_PASSWORD=ConnectAAWirelessDongle


## Enable SSH
## Enable SSH server to login and access the dongle's command prompt.
## This is usually only required when you're debugging the dongle. Not recommended for normal use.
#AAWG_ENABLE_SSH=1
